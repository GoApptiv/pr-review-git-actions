name: PR Review with AI

on:
  workflow_call:
    inputs:
      framework:
        description: Framework used in repository
        required: false
        type: string
        default: laravel

      pr-number:
        description: Pull Request Number
        required: true
        type: string

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true

      AWS_SECRET_ACCESS_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-review:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository which called this workflow
      - name: Checkout Code
        uses: actions/checkout@v4

        with:
          fetch-depth: 0

      # Checkout common AI review repository
      - name: Checkout AI Review Rules
        uses: actions/checkout@v4
        with:
          repository: GoApptiv/pr-review-git-actions
          path: pr-review-engine

      - name: Prepare Review Instructions
        run: |
          cat \
          pr-review-engine/principles/review-principle.md \
          pr-review-engine/principles/engineering-principle.md \
          pr-review-engine/principles/${{ inputs.framework }}-principle.md \
          pr-review-engine/principles/functional-principle.md \
          > review-instructions.md

      - name: Generate PR Diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff \
            ${{ inputs.pr-number }} \
            --repo ${{ github.repository }} \
            > pr.diff

      - name: Fetch PR Details
        env:
          GH_TOKEN: ${{ github.token }}

        run: |
          gh pr view \
          ${{ inputs.pr-number }} \
          --repo ${{ github.repository }} \
          --json title,body \
          > pr-details.json

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id:
            ${{ secrets.AWS_ACCESS_KEY_ID }}

          aws-secret-access-key:
            ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          aws-region: "ap-south-1"

      - name: Install Dependencies
        run: |
          pip install boto3

      - name: Run Bedrock Review
        run: |
          python pr-review-engine/scripts/bedrock-review.py

      - name: Post PR Review Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}

          script: |
            const fs = require('fs');

            const review =
              fs.readFileSync(
                'pr-review.md',
                'utf8'
              );

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: review
            });